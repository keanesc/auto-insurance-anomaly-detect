[workspace]
authors = ["keanesc <145848994+keanesc@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "auto-insurance-anomaly-detect"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
score = { cmd = "python src/score_all.py", description = "Run full fraud scoring pipeline" }
evaluate = { cmd = "python src/evaluate.py", description = "Run diagnostics and validation" }
serve = { cmd = "uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload", description = "Start the fraud detection FastAPI server" }

[dependencies]
python = "3.12.*"
pytorch-cpu = ">=2.10.0,<3"

[pypi-dependencies]
markitdown = { version = ">=0.1.5, <0.2", extras = [
    "pdf",
    "docx",
    "pptx",
    "xlsx",
] }
pandas = ">=3.0.1, <4"
numpy = ">=2.4.2, <3"
scikit-learn = ">=1.8.0, <2"
imbalanced-learn = ">=0.14.1, <0.15"
matplotlib = ">=3.10.8, <4"
seaborn = ">=0.13.2, <0.14"
joblib = ">=1.5.3, <2"
fastapi = { version = ">=0.115.0, <1", extras = ["standard"] }
uvicorn = { version = ">=0.30.0, <1", extras = ["standard"] }
httpx = ">=0.27.0, <1"
